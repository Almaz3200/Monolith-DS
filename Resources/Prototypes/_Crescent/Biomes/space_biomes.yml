#fallback, don't remove
- type: ambientSpaceBiome
  id: BiomeDefault
  name: Неисследованный космос # LuaM: Uncharted Space > Неисследованный космос

#expedition biome - hardcoded in SpawnSalvageMissionJob.cs
- type: ambientSpaceBiome
  id: BiomeExpedition
  name: Экспедиция # LuaM: Expedition > Экспедиция
  description: "Земли далёких давно забытых планет, полные опасностей и добычи." # LuaM: "Uncharted land." > "Земли далёких давно забытых планет, полные опасностей и добычи."

#ftl biome - hardcoded in ShuttleSystem.FasterThanLight.cs
- type: ambientSpaceBiome
  id: BiomeFTL
  name: Гиперпространство # LuaM: Hyperspace > Гиперпространство
  description: "Отдалённый слой космоса, соприкасающийся с блюспейс-простарнством." # LuaM: "Upon the pale horse, with Hell behind you." > "Отдалённый слой космоса, соприкасающийся с блюспейс-простарнством."

#far reaches

- type: ambientSpaceBiome
  id: BiomeFarReachesIV
  name: Far Reaches IV
  description: "Is it really worth it?"

- type: ambientSpaceBiome
  id: BiomeFarReachesIII
  name: Far Reaches III
  description: "Things have learnt to walk that ought to crawl."

- type: ambientSpaceBiome
  id: BiomeFarReachesII
  name: Far Reaches II
  description: "There's nothing this far out anymore. Or that's what you would find yourself wishing."

- type: ambientSpaceBiome
  id: BiomeFarReachesI
  name: Far Reaches I
  description: "You feel like the asteroids are moving even while you aren't. Or watching you. Or both."

#actual biomes
- type: ambientSpaceBiome
  id: BiomeOuterRing
  name: Внешнее кольцо # LuaM: Outer Ring > Внешнее кольцо
  description: "Звёзды здесь тусклее, а привычного света шаттлов и аванпостов нет вовсе." # LuaM: "Far from radio range. Far from help. The stars here are dimmer." > "Звёзды здесь тусклее, а привычного света шаттлов и аванпостов нет вовсе."

- type: ambientSpaceBiome
  id: BiomeMiddleRing
  name: Среднее кольцо # LuaM: Outer Ring > Среднее кольцо
  description: "Звёздные окраины, часто кишащие богатствами и опасностями." # LuaM: "Stellar outskirts, often crawling with riches and danger." > "Звёздные окраины, часто кишащие богатствами и опасностями."

- type: ambientSpaceBiome
  id: BiomeInnerRing
  name: Внутреннее кольцо # LuaM: Inner Ring > Внутреннее кольцо
  description: "Цивилизованная часть космоса. Созвездия, видимые отсюда, навсегда останутся в вашей памяти." # LuaM: "Civilised space. The constellations seen from here are burned into your memory." > "Цивилизованная часть космоса. Созвездия, видимые отсюда, навсегда останутся в вашей памяти."
